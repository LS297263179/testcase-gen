<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 测试用例生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 20px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 6px; }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 600; color: #1a73e8; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; display: inline-block; width: 4px; height: 18px; background: #1a73e8; border-radius: 2px; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; resize: vertical; font-family: inherit; transition: border-color 0.2s; }
        textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
        .upload-area { border: 2px dashed #d9d9d9; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #1a73e8; background: #f6f9ff; }
        .upload-area.dragover { border-color: #1a73e8; background: #e8f0fe; }
        .upload-area input { display: none; }
        .upload-area .icon { font-size: 36px; color: #bbb; margin-bottom: 8px; }
        .upload-area p { color: #666; font-size: 14px; }
        .upload-area .hint { color: #999; font-size: 12px; margin-top: 4px; }
        .file-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .file-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f6f9ff; border: 1px solid #e0e7ff; border-radius: 8px; font-size: 13px; position: relative; }
        .file-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid #e0e0e0; }
        .file-item .file-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
        .file-item .file-type { font-size: 11px; color: #1a73e8; background: #e8f0fe; padding: 1px 6px; border-radius: 3px; }
        .file-item .remove-btn { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #d32f2f; color: #fff; border: none; border-radius: 50%; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
        .section-label { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
        .options { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
        .options label { font-size: 14px; color: #555; display: flex; align-items: center; gap: 6px; }
        .options select, .options input[type="text"] { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
        .btn { padding: 10px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #1a73e8; color: #fff; }
        .btn-primary:hover { background: #1557b0; }
        .btn-primary:disabled { background: #93b8f0; cursor: not-allowed; }
        .btn-success { background: #34a853; color: #fff; }
        .btn-success:hover { background: #2d8e47; }
        .btn-success:disabled { background: #8fd4a4; cursor: not-allowed; }
        .btn-outline { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
        .btn-outline:hover { background: #f6f9ff; }
        .actions { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        .stats { display: flex; gap: 16px; }
        .stat { text-align: center; padding: 8px 16px; background: #f6f9ff; border-radius: 8px; }
        .stat .num { font-size: 24px; font-weight: 700; color: #1a73e8; }
        .stat .label { font-size: 12px; color: #666; }
        .download-btns { display: flex; gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f6f9ff; color: #1a73e8; font-weight: 600; text-align: left; padding: 12px 10px; border-bottom: 2px solid #e8e8e8; }
        td { padding: 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        tr:hover td { background: #fafafa; }
        .priority { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .priority-P0 { background: #fff0f0; color: #d32f2f; }
        .priority-P1 { background: #fff8e1; color: #f57f17; }
        .priority-P2 { background: #f1f8e9; color: #558b2f; }
        .priority-P3 { background: #e3f2fd; color: #1565c0; }
        .type-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; background: #f0f0f0; color: #555; margin-right: 4px; }
        .expand-btn { color: #1a73e8; cursor: pointer; font-size: 13px; border: none; background: none; }
        .expand-btn:hover { text-decoration: underline; }
        .detail-row { display: none; }
        .detail-row.show { display: table-row; }
        .detail-row td { background: #fafcff; padding: 16px; }
        .detail-content { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; font-size: 13px; }
        .detail-content dt { color: #888; font-size: 12px; margin-bottom: 4px; }
        .detail-content dd { color: #333; white-space: pre-wrap; line-height: 1.6; }
        .review-panel { background: #fffde7; border: 1px solid #ffe082; border-radius: 8px; padding: 20px; margin-top: 20px; white-space: pre-wrap; line-height: 1.8; font-size: 14px; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 1000; transform: translateX(120%); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #34a853; }
        .toast.error { background: #d32f2f; }
        .diff-added { background: #e6ffed; border-left: 3px solid #34a853; }
        .diff-modified { background: #fff8e1; border-left: 3px solid #f57f17; }
        .diff-removed { background: #ffeef0; border-left: 3px solid #d32f2f; }
        .diff-item { padding: 10px 14px; margin-bottom: 8px; border-radius: 6px; font-size: 13px; }
        .diff-item .diff-label { font-weight: 600; margin-right: 8px; font-size: 12px; }
        .diff-added .diff-label { color: #34a853; }
        .diff-modified .diff-label { color: #f57f17; }
        .diff-removed .diff-label { color: #d32f2f; }
        .diff-detail { color: #555; margin-top: 4px; font-size: 12px; }
        .diff-stat { text-align:center;padding:8px 16px;border-radius:8px;min-width:80px; }
        .diff-stat .num { font-size:20px;font-weight:700; }
        .diff-stat .label { font-size:12px;color:#666; }
        .diff-stat.add { background:#e6ffed; }
        .diff-stat.add .num { color:#34a853; }
        .diff-stat.mod { background:#fff8e1; }
        .diff-stat.mod .num { color:#f57f17; }
        .diff-stat.del { background:#ffeef0; }
        .diff-stat.del .num { color:#d32f2f; }
        .input-section { margin-bottom: 16px; }
        .input-section + .input-section { padding-top: 16px; border-top: 1px solid #f0f0f0; }
        @media (max-width: 768px) {
            .options { flex-direction: column; }
            .detail-content { grid-template-columns: 1fr; }
            .stats { flex-wrap: wrap; }
        }

        /* 历史记录侧边栏 */
        .history-btn { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .history-btn:hover { background: rgba(255,255,255,0.35); }
        .header { position: relative; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 998; }
        .sidebar-overlay.show { display: block; }
        .sidebar { position: fixed; top: 0; right: -400px; width: 400px; max-width: 90vw; height: 100vh; background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,0.15); z-index: 999; transition: right 0.3s; display: flex; flex-direction: column; }
        .sidebar.open { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #eee; }
        .sidebar-header h3 { font-size: 16px; color: #333; }
        .sidebar-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 4px 8px; }
        .sidebar-close:hover { color: #333; }
        .sidebar-body { flex: 1; overflow-y: auto; padding: 12px; }
        .history-item { padding: 12px 14px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .history-item:hover { border-color: #1a73e8; background: #f6f9ff; }
        .history-item .h-time { font-size: 12px; color: #999; }
        .history-item .h-preview { font-size: 13px; color: #333; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item .h-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 12px; color: #666; }
        .history-item .h-actions { display: flex; gap: 6px; margin-top: 8px; }
        .history-item .h-actions button { font-size: 12px; padding: 3px 10px; border-radius: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #555; }
        .history-item .h-actions button:hover { border-color: #1a73e8; color: #1a73e8; }
        .history-item .h-actions .del-btn:hover { border-color: #d32f2f; color: #d32f2f; }
        .history-empty { text-align: center; color: #999; padding: 40px 20px; font-size: 14px; }

        /* 内联编辑 */
        .edit-input { width: 100%; padding: 4px 8px; border: 1px solid #1a73e8; border-radius: 4px; font-size: 13px; font-family: inherit; background: #f0f6ff; }
        .edit-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .edit-textarea { width: 100%; padding: 6px 8px; border: 1px solid #1a73e8; border-radius: 4px; font-size: 13px; font-family: inherit; background: #f0f6ff; resize: vertical; min-height: 60px; }
        .edit-textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .edit-actions button { font-size: 12px; padding: 3px 10px; border-radius: 4px; border: none; cursor: pointer; margin-right: 4px; }
        .edit-save { background: #34a853; color: #fff; }
        .edit-cancel { background: #eee; color: #555; }
        .edited-badge { display: inline-block; font-size: 11px; color: #f57f17; background: #fff8e1; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }

        /* 偏好管理 */
        .pref-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
        .pref-item.inactive { opacity: 0.5; }
        .pref-cat { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #e8f0fe; color: #1a73e8; white-space: nowrap; }
        .pref-pattern { flex: 1; color: #333; }
        .pref-weight { font-size: 11px; color: #999; white-space: nowrap; }
        .pref-item button { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #555; }
        .pref-item button:hover { border-color: #1a73e8; color: #1a73e8; }
        .pref-item .pref-del:hover { border-color: #d32f2f; color: #d32f2f; }
    </style>
</head>
<body>
    <div class="header">
        <h1>我来帮你写用例</h1>
        <p>输入需求描述 / 上传需求文档 / 截图 UI 设计稿，自动生成测试用例</p>
        <button class="history-btn" onclick="toggleHistory()">&#128194; 历史记录</button>
    </div>

    <!-- 历史记录侧边栏 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleHistory()"></div>
    <div class="sidebar" id="historySidebar">
        <div class="sidebar-header">
            <h3>&#128194; 历史记录</h3>
            <button class="sidebar-close" onclick="toggleHistory()">&times;</button>
        </div>
        <div class="sidebar-body" id="historyList">
            <div class="history-empty">暂无历史记录</div>
        </div>
    </div>

    <div class="container">
        <!-- 输入区 -->
        <div class="card">
            <div class="card-title">需求输入</div>

            <!-- 文本输入 -->
            <div class="input-section">
                <div class="section-label">文字描述（可选，与图片配合使用效果更佳）</div>
                <textarea id="requirement" placeholder="请输入需求描述...&#10;&#10;例如：&#10;用户通过手机号+验证码登录系统&#10;1. 手机号为11位中国大陆手机号&#10;2. 验证码为6位数字，有效期5分钟&#10;3. 同一手机号每天最多发送10次验证码"></textarea>
            </div>

            <!-- 文件/图片上传 -->
            <div class="input-section">
                <div class="section-label">上传文件（支持需求文档 + UI 截图混合上传）</div>
                <div class="upload-area" id="uploadArea">
                    <div class="icon">&#128228;</div>
                    <p>点击或拖拽文件到此处</p>
                    <div class="hint">支持 .md / .txt / .xlsx 需求文档 + .png / .jpg / .gif / .webp 图片，可同时上传多个</div>
                    <input type="file" id="fileInput" multiple accept=".md,.txt,.xlsx,.xls,.png,.jpg,.jpeg,.gif,.webp,.bmp">
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <div class="options">
                <label>默认优先级:
                    <select id="priority">
                        <option value="P0">P0 - 阻塞</option>
                        <option value="P1" selected>P1 - 严重</option>
                        <option value="P2">P2 - 一般</option>
                        <option value="P3">P3 - 轻微</option>
                    </select>
                </label>
                <label>用例类型:
                    <input type="text" id="caseTypes" value="功能测试,边界测试,异常测试" placeholder="逗号分隔" style="width:240px;">
                </label>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="btnGenerate" onclick="generate()">生成测试用例</button>
            </div>
        </div>

        <!-- 加载中 -->
        <div id="loading" class="card" style="display:none;text-align:center;padding:40px;">
            <div class="spinner" style="width:32px;height:32px;border:3px solid #e8e8e8;border-top-color:#1a73e8;animation:spin 0.8s linear infinite;"></div>
            <p style="margin-top:12px;color:#666;" id="loadingText">正在调用 AI 生成测试用例，请稍候...</p>
        </div>

        <!-- 结果区 -->
        <div id="result" class="card" style="display:none;">
            <div class="result-header">
                <div class="stats">
                    <div class="stat"><div class="num" id="totalCount">0</div><div class="label">用例总数</div></div>
                    <div class="stat"><div class="num" id="p0Count">0</div><div class="label">P0</div></div>
                    <div class="stat"><div class="num" id="p1Count">0</div><div class="label">P1</div></div>
                    <div class="stat"><div class="num" id="p2Count">0</div><div class="label">P2</div></div>
                    <div class="stat"><div class="num" id="p3Count">0</div><div class="label">P3</div></div>
                </div>
                <div class="download-btns">
                    <button class="btn btn-outline" onclick="downloadFile('excel')">&#128196; 下载 Excel</button>
                    <button class="btn btn-outline" onclick="downloadFile('markdown')">&#128221; 下载 Markdown</button>
                    <button class="btn btn-success" id="btnReview" onclick="review()">&#128269; AI 评审</button>
                    <button class="btn btn-outline" id="btnSavePref" onclick="savePreferences()" style="display:none;">&#128161; 保存偏好</button>
                </div>
            </div>
            <div id="inputInfo" style="margin-bottom:12px;font-size:13px;color:#888;"></div>
            <table>
                <thead>
                    <tr>
                        <th style="width:80px;">编号</th>
                        <th style="width:100px;">模块</th>
                        <th>标题</th>
                        <th style="width:70px;">优先级</th>
                        <th style="width:90px;">类型</th>
                        <th style="width:60px;">操作</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <!-- 评审报告 -->
        <div id="reviewPanel" class="card" style="display:none;">
            <div class="card-title">AI 评审报告</div>
            <div class="review-panel" id="reviewContent"></div>
            <div style="text-align:center;margin-top:16px;">
                <button class="btn btn-success" id="btnOptimize" onclick="optimize()">&#128640; 根据评审优化用例</button>
            </div>
        </div>

        <!-- 优化对比 -->
        <div id="diffPanel" class="card" style="display:none;">
            <div class="card-title">优化变更对比</div>
            <div class="diff-stats" id="diffStats" style="display:flex;gap:16px;margin-bottom:16px;"></div>
            <div id="diffContent" style="max-height:500px;overflow-y:auto;"></div>
        </div>

        <!-- 偏好管理 -->
        <div class="card" id="prefPanel">
            <div class="card-title" style="cursor:pointer;" onclick="togglePrefPanel()">
                <span>偏好规则管理</span>
                <span id="prefToggle" style="font-size:12px;color:#999;margin-left:auto;">展开</span>
            </div>
            <div id="prefContent" style="display:none;">
                <div id="prefList" style="margin-top:8px;"></div>
                <div style="text-align:center;margin-top:12px;">
                    <button class="btn btn-outline" onclick="loadPreferences()" style="font-size:13px;padding:6px 16px;">刷新</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentFiles = {};
        let currentRequirement = '';
        let currentTestcases = [];
        let currentReview = '';
        let originalTestcases = [];
        let uploadedFiles = [];
        let currentSessionId = null;

        // 文件上传
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => {
            addFiles(fileInput.files);
            fileInput.value = '';
        });

        // 粘贴图片到文本框自动添加到上传区
        document.getElementById('requirement').addEventListener('paste', e => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) {
                        const ext = file.type.split('/')[1] || 'png';
                        const namedFile = new File([file], `粘贴图片_${Date.now()}.${ext}`, { type: file.type });
                        uploadedFiles.push(namedFile);
                        renderFileList();
                        showToast('已从剪贴板添加图片');
                    }
                }
            }
        });

        function addFiles(files) {
            for (const file of files) {
                if (uploadedFiles.some(f => f.name === file.name && f.size === file.size)) continue;
                uploadedFiles.push(file);
            }
            renderFileList();
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            renderFileList();
        }

        function renderFileList() {
            if (!uploadedFiles.length) {
                fileList.innerHTML = '';
                return;
            }
            fileList.innerHTML = uploadedFiles.map((file, i) => {
                const isImg = /\.(png|jpe?g|gif|webp|bmp)$/i.test(file.name);
                const ext = file.name.split('.').pop().toUpperCase();
                let preview = '';
                if (isImg) {
                    const url = URL.createObjectURL(file);
                    preview = `<img src="${url}" alt="${file.name}">`;
                }
                return `<div class="file-item">
                    ${preview}
                    <div>
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <span class="file-type">${isImg ? '图片' : ext}</span>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${i})" title="移除">&times;</button>
                </div>`;
            }).join('');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // SSE 通用请求：onProgress 收到进度消息，onDone 收到最终结果
        async function sseFetch(url, body, { onProgress, onDone }) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const event = JSON.parse(line.slice(6));
                        if (event.type === 'progress' && onProgress) {
                            onProgress(event.message);
                        } else if (event.type === 'done' && onDone) {
                            onDone(event.data);
                        } else if (event.type === 'error') {
                            throw new Error(event.message);
                        }
                    } catch (e) {
                        if (e.message && !e.message.includes('JSON')) throw e;
                    }
                }
            }
        }

        async function generate() {
            const requirement = document.getElementById('requirement').value.trim();

            if (!requirement && !uploadedFiles.length) {
                showToast('请输入需求描述或上传文件/图片', 'error');
                return;
            }

            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>生成中...';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loadingText').textContent = 'AI 正在分析需求...';
            document.getElementById('result').style.display = 'none';
            document.getElementById('reviewPanel').style.display = 'none';
            document.getElementById('diffPanel').style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('requirement', requirement);
                formData.append('priority', document.getElementById('priority').value);
                formData.append('case_types', document.getElementById('caseTypes').value);
                for (const file of uploadedFiles) {
                    formData.append('files', file);
                }

                // SSE 流式请求
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留不完整的行

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(line.slice(6));
                            if (event.type === 'progress') {
                                document.getElementById('loadingText').textContent = event.message;
                            } else if (event.type === 'done') {
                                const data = event.data;
                                currentTestcases = data.testcases;
                                currentFiles = data.files;
                                currentRequirement = requirement;
                                currentSessionId = data.session_id || null;
                                renderResult(data);
                                let msg = `生成成功！共 ${data.count} 条用例`;
                                if (data.input && data.input.image_count > 0) {
                                    msg += `（含 ${data.input.image_count} 张图片）`;
                                }
                                showToast(msg);
                            } else if (event.type === 'error') {
                                throw new Error(event.message);
                            }
                        } catch (e) {
                            if (e.message && !e.message.includes('JSON')) throw e;
                        }
                    }
                }

            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '生成测试用例';
                document.getElementById('loading').style.display = 'none';
            }
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/`/g, '&#96;').replace(/\$/g, '&#36;');
        }

        function renderResult(data) {
            const testcases = data.testcases;
            const counts = { P0: 0, P1: 0, P2: 0, P3: 0 };
            testcases.forEach(tc => { counts[tc.priority] = (counts[tc.priority] || 0) + 1; });

            document.getElementById('totalCount').textContent = testcases.length;
            document.getElementById('p0Count').textContent = counts.P0;
            document.getElementById('p1Count').textContent = counts.P1;
            document.getElementById('p2Count').textContent = counts.P2;
            document.getElementById('p3Count').textContent = counts.P3;

            // 显示输入信息
            const info = data.input;
            let infoText = '';
            if (info) {
                const parts = [];
                if (info.has_text) parts.push('文字需求');
                if (info.image_count > 0) parts.push(`${info.image_count} 张图片 (${info.image_names.join(', ')})`);
                if (parts.length) infoText = '输入来源: ' + parts.join(' + ');
            }
            document.getElementById('inputInfo').textContent = infoText;

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = testcases.map((tc, i) => `
                <tr id="row-${i}">
                    <td><strong>${esc(tc.id)}</strong></td>
                    <td>${esc(tc.module)}</td>
                    <td>${esc(tc.title)}</td>
                    <td><span class="priority priority-${esc(tc.priority)}">${esc(tc.priority)}</span></td>
                    <td><span class="type-tag">${esc(tc.type)}</span></td>
                    <td>
                        <button class="expand-btn" onclick="toggleDetail(${i})">详情</button>
                        <button class="expand-btn" onclick="editCase(${i})" style="margin-left:4px;">编辑</button>
                    </td>
                </tr>
                <tr class="detail-row" id="detail-${i}">
                    <td colspan="6">
                        <div class="detail-content">
                            <div><dt>前置条件</dt><dd>${esc(tc.precondition) || '无'}</dd></div>
                            <div><dt>测试步骤</dt><dd>${esc(tc.steps).replace(/\\n/g, '<br>')}</dd></div>
                            <div><dt>预期结果</dt><dd>${esc(tc.expected)}</dd></div>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.getElementById('result').style.display = 'block';
        }

        function toggleDetail(i) {
            const row = document.getElementById('detail-' + i);
            row.classList.toggle('show');
        }

        function downloadFile(type) {
            const path = type === 'excel' ? currentFiles.excel : currentFiles.markdown;
            if (!path) return;
            const filename = path.split(/[/\\]/).pop();
            window.open('/api/download/' + filename, '_blank');
        }

        async function review() {
            const btn = document.getElementById('btnReview');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>评审中...';

            try {
                await sseFetch('/api/review', {
                    requirement: currentRequirement,
                    testcases: currentTestcases,
                }, {
                    onProgress: msg => { btn.innerHTML = `<span class="spinner"></span>${msg}`; },
                    onDone: data => {
                        currentReview = data.review;
                        document.getElementById('reviewContent').textContent = data.review;
                        document.getElementById('reviewPanel').style.display = 'block';
                        document.getElementById('reviewPanel').scrollIntoView({ behavior: 'smooth' });
                        showToast('评审完成');
                    },
                });
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '&#128269; AI 评审';
            }
        }

        async function optimize() {
            const btn = document.getElementById('btnOptimize');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>优化中...';

            // 保存优化前的用例快照
            originalTestcases = JSON.parse(JSON.stringify(currentTestcases));

            try {
                await sseFetch('/api/optimize', {
                    requirement: currentRequirement,
                    testcases: currentTestcases,
                    review: currentReview,
                }, {
                    onProgress: msg => { btn.innerHTML = `<span class="spinner"></span>${msg}`; },
                    onDone: data => {
                        currentTestcases = data.testcases;
                        currentFiles = data.files;
                        renderResult(data);
                        showDiff(originalTestcases, data.testcases);
                        showToast(`优化完成！共 ${data.count} 条用例`);
                    },
                });
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '&#128640; 根据评审优化用例';
            }
        }

        function showDiff(oldCases, newCases) {
            // 基于内容相似度匹配，而非 ID（优化后 ID 会重新编号）
            const SIMILAR_THRESHOLD = 0.4;

            function similarity(a, b) {
                if (!a || !b) return 0;
                const normalize = s => s.replace(/\s+/g, '').toLowerCase();
                const na = normalize(a), nb = normalize(b);
                if (na === nb) return 1;
                // 用较短字符串的字符在较长字符串中的出现比例估算相似度
                const [shorter, longer] = na.length <= nb.length ? [na, nb] : [nb, na];
                let matches = 0;
                for (const ch of shorter) {
                    if (longer.includes(ch)) matches++;
                }
                return shorter.length ? matches / shorter.length : 0;
            }

            function tcSimilarity(a, b) {
                const titleSim = similarity(a.title, b.title);
                const stepsSim = similarity(a.steps, b.steps);
                const expectedSim = similarity(a.expected, b.expected);
                return titleSim * 0.4 + stepsSim * 0.3 + expectedSim * 0.3;
            }

            const added = [], modified = [], removed = [];
            const matchedOld = new Set();
            const matchedNew = new Set();

            // 第一轮：找最佳匹配对
            const pairs = [];
            newCases.forEach((newTc, ni) => {
                oldCases.forEach((oldTc, oi) => {
                    const sim = tcSimilarity(newTc, oldTc);
                    if (sim >= SIMILAR_THRESHOLD) {
                        pairs.push({ ni, oi, sim, newTc, oldTc });
                    }
                });
            });
            // 按相似度降序排列，贪心匹配
            pairs.sort((a, b) => b.sim - a.sim);
            pairs.forEach(pair => {
                if (matchedNew.has(pair.ni) || matchedOld.has(pair.oi)) return;
                matchedNew.add(pair.ni);
                matchedOld.add(pair.oi);

                if (pair.sim < 0.95) {
                    // 相似但有差异 → 修改
                    const changes = [];
                    if (pair.oldTc.title !== pair.newTc.title)
                        changes.push(`标题: "${pair.oldTc.title}" → "${pair.newTc.title}"`);
                    if (pair.oldTc.steps !== pair.newTc.steps)
                        changes.push('测试步骤已更新');
                    if (pair.oldTc.expected !== pair.newTc.expected)
                        changes.push(`预期结果已更新`);
                    if (pair.oldTc.priority !== pair.newTc.priority)
                        changes.push(`优先级: ${pair.oldTc.priority} → ${pair.newTc.priority}`);
                    if (pair.oldTc.type !== pair.newTc.type)
                        changes.push(`类型: ${pair.oldTc.type} → ${pair.newTc.type}`);
                    if (changes.length) modified.push({ tc: pair.newTc, oldTc: pair.oldTc, changes });
                }
                // sim >= 0.95 视为未修改，跳过
            });

            // 未匹配的新用例 → 新增
            newCases.forEach((tc, i) => {
                if (!matchedNew.has(i)) added.push(tc);
            });
            // 未匹配的旧用例 → 删除
            oldCases.forEach((tc, i) => {
                if (!matchedOld.has(i)) removed.push(tc);
            });

            // 无变更
            if (!added.length && !modified.length && !removed.length) {
                document.getElementById('diffPanel').style.display = 'none';
                return;
            }

            // 统计
            document.getElementById('diffStats').innerHTML = `
                <div class="diff-stat add"><div class="num">+${added.length}</div><div class="label">新增</div></div>
                <div class="diff-stat mod"><div class="num">${modified.length}</div><div class="label">修改</div></div>
                <div class="diff-stat del"><div class="num">-${removed.length}</div><div class="label">删除</div></div>
            `;

            // 详情
            let html = '';
            added.forEach(tc => {
                html += `<div class="diff-item diff-added">
                    <span class="diff-label">新增</span> ${esc(tc.title)}
                    <div class="diff-detail">${esc(tc.steps).substring(0, 100)}${tc.steps.length > 100 ? '...' : ''}</div>
                </div>`;
            });
            modified.forEach(({ tc, oldTc, changes }) => {
                html += `<div class="diff-item diff-modified">
                    <span class="diff-label">修改</span> ${esc(tc.title)}
                    <div class="diff-detail">${esc(changes.join(' | '))}</div>
                </div>`;
            });
            removed.forEach(tc => {
                html += `<div class="diff-item diff-removed">
                    <span class="diff-label">删除</span> ${esc(tc.title)}
                    <div class="diff-detail">${esc(tc.steps).substring(0, 100)}${tc.steps.length > 100 ? '...' : ''}</div>
                </div>`;
            });

            document.getElementById('diffContent').innerHTML = html;
            document.getElementById('diffPanel').style.display = 'block';
            document.getElementById('diffPanel').scrollIntoView({ behavior: 'smooth' });
        }

        // ============================================================
        // 历史记录
        // ============================================================
        function toggleHistory() {
            const sidebar = document.getElementById('historySidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('show');
                loadHistory();
            }
        }

        async function loadHistory() {
            const list = document.getElementById('historyList');
            try {
                const resp = await fetch('/api/history?limit=50');
                const data = await resp.json();
                const sessions = data.sessions || [];
                if (!sessions.length) {
                    list.innerHTML = '<div class="history-empty">暂无历史记录</div>';
                    return;
                }
                list.innerHTML = sessions.map(s => `
                    <div class="history-item">
                        <div class="h-time">${esc(s.created_at)}</div>
                        <div class="h-preview" title="${esc(s.requirement)}">${esc(s.requirement_preview)}</div>
                        <div class="h-meta">
                            <span>${s.tc_count} 条用例</span>
                            ${s.priority ? '<span>' + esc(s.priority) + '</span>' : ''}
                        </div>
                        <div class="h-actions">
                            <button onclick="loadSession(${s.id})">加载</button>
                            <button class="del-btn" onclick="deleteSession(${s.id}, event)">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<div class="history-empty">加载失败: ' + esc(err.message) + '</div>';
            }
        }

        async function loadSession(id) {
            try {
                const resp = await fetch('/api/history/' + id);
                if (!resp.ok) throw new Error('记录不存在');
                const session = await resp.json();

                // 填充表单
                document.getElementById('requirement').value = session.requirement || '';
                if (session.priority) document.getElementById('priority').value = session.priority;
                if (session.case_types) document.getElementById('caseTypes').value = session.case_types.join(',');

                // 加载用例
                currentTestcases = session.testcases;
                currentRequirement = session.requirement;
                currentSessionId = session.id;
                currentReview = session.review_report || '';
                currentFiles = {};

                renderResult({ testcases: session.testcases, count: session.testcases.length, files: {}, session_id: session.id, input: { has_text: !!session.requirement, image_count: session.images ? session.images.length : 0, image_names: session.images ? session.images.map(i => i.filename || '') : [] } });

                // 如果有评审报告，显示
                if (currentReview) {
                    document.getElementById('reviewContent').textContent = currentReview;
                    document.getElementById('reviewPanel').style.display = 'block';
                }

                toggleHistory();
                showToast('已加载历史记录 #' + id);
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function deleteSession(id, event) {
            event.stopPropagation();
            if (!confirm('确定删除这条历史记录？')) return;
            try {
                await fetch('/api/history/' + id, { method: 'DELETE' });
                showToast('已删除');
                loadHistory();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ============================================================
        // 内联编辑
        // ============================================================
        function editCase(i) {
            const tc = currentTestcases[i];
            const row = document.getElementById('row-' + i);
            const detailRow = document.getElementById('detail-' + i);

            // 切换主行为编辑模式
            row.innerHTML = `
                <td><strong>${esc(tc.id)}</strong></td>
                <td><input class="edit-input" id="edit-module-${i}" value="${esc(tc.module)}" style="width:100px;"></td>
                <td><input class="edit-input" id="edit-title-${i}" value="${esc(tc.title)}"></td>
                <td>
                    <select id="edit-priority-${i}" style="padding:4px;border:1px solid #1a73e8;border-radius:4px;font-size:12px;">
                        <option value="P0" ${tc.priority==='P0'?'selected':''}>P0</option>
                        <option value="P1" ${tc.priority==='P1'?'selected':''}>P1</option>
                        <option value="P2" ${tc.priority==='P2'?'selected':''}>P2</option>
                        <option value="P3" ${tc.priority==='P3'?'selected':''}>P3</option>
                    </select>
                </td>
                <td><input class="edit-input" id="edit-type-${i}" value="${esc(tc.type)}" style="width:80px;font-size:12px;"></td>
                <td class="edit-actions">
                    <button class="edit-save" onclick="saveEdit(${i})">保存</button>
                    <button class="edit-cancel" onclick="cancelEdit(${i})">取消</button>
                </td>
            `;

            // 切换详情行为编辑模式
            detailRow.classList.add('show');
            detailRow.innerHTML = `
                <td colspan="6" style="background:#f8fbff;">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div>
                            <dt style="color:#888;font-size:12px;margin-bottom:4px;">前置条件</dt>
                            <textarea class="edit-textarea" id="edit-precondition-${i}" rows="2">${esc(tc.precondition)}</textarea>
                        </div>
                        <div>
                            <dt style="color:#888;font-size:12px;margin-bottom:4px;">预期结果</dt>
                            <textarea class="edit-textarea" id="edit-expected-${i}" rows="2">${esc(tc.expected)}</textarea>
                        </div>
                        <div style="grid-column:1/-1;">
                            <dt style="color:#888;font-size:12px;margin-bottom:4px;">测试步骤</dt>
                            <textarea class="edit-textarea" id="edit-steps-${i}" rows="4">${esc(tc.steps)}</textarea>
                        </div>
                    </div>
                </td>
            `;
        }

        function saveEdit(i) {
            const tc = currentTestcases[i];
            // 保存原始版本用于偏好对比
            if (!originalTestcases.length) {
                originalTestcases = JSON.parse(JSON.stringify(currentTestcases));
            }

            tc.module = document.getElementById('edit-module-' + i).value;
            tc.title = document.getElementById('edit-title-' + i).value;
            tc.priority = document.getElementById('edit-priority-' + i).value;
            tc.type = document.getElementById('edit-type-' + i).value;
            tc.precondition = document.getElementById('edit-precondition-' + i).value;
            tc.expected = document.getElementById('edit-expected-' + i).value;
            tc.steps = document.getElementById('edit-steps-' + i).value;

            renderResult({ testcases: currentTestcases, count: currentTestcases.length, files: currentFiles, session_id: currentSessionId, input: {} });
            document.getElementById('btnSavePref').style.display = '';
            showToast('已保存修改');
        }

        function cancelEdit(i) {
            renderResult({ testcases: currentTestcases, count: currentTestcases.length, files: currentFiles, session_id: currentSessionId, input: {} });
        }

        async function savePreferences() {
            if (!originalTestcases.length) {
                showToast('没有检测到修改', 'error');
                return;
            }
            const btn = document.getElementById('btnSavePref');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>分析中...';

            try {
                await sseFetch('/api/preferences/extract', {
                    original: originalTestcases,
                    edited: currentTestcases,
                    session_id: currentSessionId,
                }, {
                    onProgress: msg => { btn.innerHTML = `<span class="spinner"></span>${msg}`; },
                    onDone: data => {
                        if (data.preferences && data.preferences.length) {
                            showToast(`已提取 ${data.count} 条偏好规则`);
                            loadPreferences();
                        } else {
                            showToast('未提取到通用偏好规则');
                        }
                        originalTestcases = [];
                        btn.style.display = 'none';
                    },
                });
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '&#128161; 保存偏好';
            }
        }

        // ============================================================
        // 偏好管理
        // ============================================================
        function togglePrefPanel() {
            const content = document.getElementById('prefContent');
            const toggle = document.getElementById('prefToggle');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                toggle.textContent = '收起';
                loadPreferences();
            } else {
                content.style.display = 'none';
                toggle.textContent = '展开';
            }
        }

        async function loadPreferences() {
            const list = document.getElementById('prefList');
            try {
                const resp = await fetch('/api/preferences');
                const data = await resp.json();
                const prefs = data.preferences || [];
                if (!prefs.length) {
                    list.innerHTML = '<div style="text-align:center;color:#999;padding:16px;font-size:13px;">暂无偏好规则，编辑用例后点击"保存偏好"即可自动提取</div>';
                    return;
                }
                list.innerHTML = prefs.map(p => `
                    <div class="pref-item ${p.active ? '' : 'inactive'}">
                        <span class="pref-cat">${esc(p.category)}</span>
                        <span class="pref-pattern">${esc(p.pattern)}</span>
                        <span class="pref-weight">权重: ${p.weight.toFixed(1)}</span>
                        <button onclick="togglePref(${p.id}, ${p.active ? 0 : 1})">${p.active ? '禁用' : '启用'}</button>
                        <button class="pref-del" onclick="deletePref(${p.id})">删除</button>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<div style="text-align:center;color:#d32f2f;padding:16px;">加载失败</div>';
            }
        }

        async function togglePref(id, active) {
            try {
                await fetch('/api/preferences/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ active }),
                });
                showToast(active ? '已启用' : '已禁用');
                loadPreferences();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function deletePref(id) {
            if (!confirm('确定删除这条偏好规则？')) return;
            try {
                await fetch('/api/preferences/' + id, { method: 'DELETE' });
                showToast('已删除');
                loadPreferences();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
    </script>
</body>
